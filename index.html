<title>Successor Board</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:

    radial-gradient(700px 500px at -10% 110%, rgba(232,196,122,.10), transparent 55%),
    #06070a; color:#f4f6fb;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}

  p.sub{color:#9aa3b6;font-size:16px;margin-bottom:26px}

  input{font-size:19px;padding:16px 18px;border-radius:14px;border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.05);color:#f4f6fb;width:100%;-webkit-appearance:none}
  input:focus{outline:none;border-color:#e8c47a;box-shadow:0 0 0 3px rgba(232,196,122,.18)}
  button{font-size:18px;font-weight:800;padding:16px;border-radius:14px;border:0;cursor:pointer;
    background:linear-gradient(180deg,#f0d091,#e8c47a);color:#0a0b0e}
  button:active{transform:translateY(1px)}
  .err{color:#ff8a8a;font-size:15px;min-height:20px;font-weight:600}
</style></head>

<script>
(function(){
  var P = JSON.parse(document.getElementById('payload').textContent);
  function b64ToBytes(b64){ var bin = atob(b64); var a = new Uint8Array(bin.length); for (var i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; }
  async function decrypt(pw){
    var enc = new TextEncoder();
    var salt = b64ToBytes(P.salt), iv = b64ToBytes(P.iv), ct = b64ToBytes(P.ct);
    var baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt: salt, iterations: P.iterations, hash:'SHA-256' },
      baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    var plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv: iv }, key, ct);
    return new TextDecoder().decode(plain);
  }
  var form = document.getElementById('f');
  var errEl = document.getElementById('err');
  var btn = document.getElementById('go');
  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errEl.textContent=''; btn.disabled=true; btn.textContent='Unlocking…';
    try {
      var html = await decrypt(document.getElementById('pw').value);
      document.open(); document.write(html); document.close();
    } catch (ex) {
      btn.disabled=false; btn.textContent='Unlock';
      errEl.textContent='Wrong password — try again.';
    }
  });
})();
</script>
